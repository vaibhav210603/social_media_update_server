<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Social Media Calendar Reminder</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background:#f4f0e6; color:#2c2c2c; margin:0; padding:48px 24px; }
      .card { max-width: 560px; margin: 0 auto; background:#fdfcf7; border:1px solid #e6e1d5; border-radius:12px; padding:28px 32px; }
      h1 { font-family: Georgia, serif; color:#2f3a26; margin: 0 0 6px 0; }
      .tag { font-size:11px; letter-spacing:2px; color:#7a6d4f; text-transform:uppercase; }
      code { background:#eee7d4; padding:2px 6px; border-radius:4px; font-size:13px; }
      p { line-height: 1.55; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="tag">Service</div>
      <h1>Social Media Calendar Reminder</h1>
      <p>This service runs a daily Vercel cron at <code>30 3 * * *</code> UTC (9:00 AM IST). It reads the social media calendar from Google Sheets and emails the team one day before each scheduled occasion.</p>
      <p>There is no public UI. The scheduled job hits <code>/api/cron</code> internally.</p>
    </div>
  </body>
</html>
